<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Prontuário Médico - Dashboard</title>
    <style>
        /* Variáveis de Cores e Estilos Globais */
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #27ae60;
            --danger-color: #e74c3c;
            --warning-color: #f39c12;
            --light-bg: #f4f7f6;
            --white: #ffffff;
            --text-color: #333;
            --border-radius: 8px;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light-bg);
            color: var(--text-color);
            line-height: 1.6;
        }

        /* Layout do Dashboard */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background-color: var(--primary-color);
            color: var(--white);
            padding: 1rem 2rem;
            margin-bottom: 2rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 1.5rem;
        }

        /* Seções */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 350px 1fr;
            }
        }

        .card {
            background: var(--white);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        .card h2 {
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
            color: var(--primary-color);
            border-bottom: 2px solid var(--light-bg);
            padding-bottom: 0.5rem;
        }

        /* Formulários */
        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
        }

        .btn {
            cursor: pointer;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            transition: opacity 0.3s;
            display: inline-block;
            text-align: center;
            width: 100%;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-primary { background-color: var(--secondary-color); color: white; }
        .btn-success { background-color: var(--success-color); color: white; }
        .btn-danger { background-color: var(--danger-color); color: white; }
        .btn-warning { background-color: var(--warning-color); color: white; }

        /* Tabela */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: #f8f9fa;
            color: var(--primary-color);
        }

        .badge {
            padding: 0.3rem 0.6rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .badge-medico { background-color: #d1ecf1; color: #0c5460; }
        .badge-paciente { background-color: #d4edda; color: #155724; }

        .actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
            width: auto;
        }

        /* Mensagens de Feedback */
        #toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 2rem;
            border-radius: var(--border-radius);
            color: white;
            display: none;
            z-index: 1000;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: var(--border-radius);
            width: 90%;
            max-width: 500px;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 1.5rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div class="container">
        <header>
            <h1>Prontuário Médico</h1>
            <span>Painel Administrativo</span>
        </header>

        <div class="dashboard-grid">
            <!-- Seção de Cadastro -->
            <section class="card">
                <h2>Cadastrar Usuário</h2>
                <form id="formCadastro">
                    <div class="form-group">
                        <label for="nome">Nome Completo</label>
                        <input type="text" id="nome" required placeholder="Ex: João Silva">
                    </div>
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" required placeholder="exemplo@email.com">
                    </div>
                    <div class="form-group">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" required placeholder="********">
                    </div>
                    <div class="form-group">
                        <label for="tipo">Tipo de Usuário</label>
                        <select id="tipo" required>
                            <option value="">Selecione...</option>
                            <option value="paciente">Paciente</option>
                            <option value="medico">Médico</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Cadastrar Usuário</button>
                </form>
            </section>

            <!-- Seção de Listagem -->
            <section class="card">
                <h2>Usuários Cadastrados</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>E-mail</th>
                                <th>Tipo</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="listaUsuarios">
                            <!-- Preenchido via JS -->
                            <tr>
                                <td colspan="4" style="text-align: center;">Carregando usuários...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>

    <!-- Modal de Edição -->
    <div id="modalEdicao" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="fecharModal()">&times;</span>
            <h2>Editar Usuário</h2>
            <form id="formEdicao">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label for="editNome">Nome Completo</label>
                    <input type="text" id="editNome" required>
                </div>
                <div class="form-group">
                    <label for="editEmail">E-mail</label>
                    <input type="email" id="editEmail" required>
                </div>
                <div class="form-group">
                    <label for="editTipo">Tipo de Usuário</label>
                    <select id="editTipo" required>
                        <option value="paciente">Paciente</option>
                        <option value="medico">Médico</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editSenha">Senha (deixe em branco para manter)</label>
                    <input type="password" id="editSenha" placeholder="********">
                </div>
                <button type="submit" class="btn btn-success">Salvar Alterações</button>
            </form>
        </div>
    </div>

    <script>
        /**
         * Configurações e Variáveis Globais
         */
        const API_URL = 'http://localhost/Prontuario_Medico/BackEnd/usuarios.php';
        const listaUsuariosBody = document.getElementById('listaUsuarios');
        const formCadastro = document.getElementById('formCadastro');
        const formEdicao = document.getElementById('formEdicao');
        const modalEdicao = document.getElementById('modalEdicao');
        const toast = document.getElementById('toast');

        /**
         * Inicialização
         */
        document.addEventListener('DOMContentLoaded', () => {
            listarUsuarios();
            
            // Event Listeners
            formCadastro.addEventListener('submit', criarUsuario);
            formEdicao.addEventListener('submit', atualizarUsuario);
        });

        /**
         * Funções de Comunicação com a API (CRUD)
         */

        // LISTAR (GET)
        async function listarUsuarios() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Erro ao buscar usuários');
                
                const usuarios = await response.json();
                renderizarTabela(usuarios);
            } catch (error) {
                console.error(error);
                showToast('Erro ao carregar lista de usuários', 'danger');
                listaUsuariosBody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: red;">Falha ao carregar dados.</td></tr>';
            }
        }

        // CRIAR (POST)
        async function criarUsuario(e) {
            e.preventDefault();
            
            const dados = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                senha: document.getElementById('senha').value,
                tipo: document.getElementById('tipo').value
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                const result = await response.json();

                if (response.ok) {
                    showToast('Usuário criado com sucesso!', 'success');
                    formCadastro.reset();
                    listarUsuarios();
                } else {
                    throw new Error(result.mensagem || 'Erro ao criar usuário');
                }
            } catch (error) {
                showToast(error.message, 'danger');
            }
        }

        // ATUALIZAR (PUT)
        async function atualizarUsuario(e) {
            e.preventDefault();
            
            const id = document.getElementById('editId').value;
            const dados = {
                id: id,
                nome: document.getElementById('editNome').value,
                email: document.getElementById('editEmail').value,
                tipo: document.getElementById('editTipo').value
            };

            // Adiciona senha apenas se preenchida
            const senha = document.getElementById('editSenha').value;
            if (senha) dados.senha = senha;

            try {
                const response = await fetch(API_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                const result = await response.json();

                if (response.ok) {
                    showToast('Usuário atualizado com sucesso!', 'success');
                    fecharModal();
                    listarUsuarios();
                } else {
                    throw new Error(result.mensagem || 'Erro ao atualizar usuário');
                }
            } catch (error) {
                showToast(error.message, 'danger');
            }
        }

        // EXCLUIR (DELETE)
        async function excluirUsuario(id) {
            if (!confirm('Tem certeza que deseja excluir este usuário?')) return;

            try {
                const response = await fetch(`${API_URL}?id=${id}`, {
                    method: 'DELETE'
                });

                const result = await response.json();

                if (response.ok) {
                    showToast('Usuário excluído!', 'success');
                    listarUsuarios();
                } else {
                    throw new Error(result.mensagem || 'Erro ao excluir usuário');
                }
            } catch (error) {
                showToast(error.message, 'danger');
            }
        }

        /**
         * Funções de Interface (UI)
         */

        function renderizarTabela(usuarios) {
            listaUsuariosBody.innerHTML = '';

            if (usuarios.length === 0) {
                listaUsuariosBody.innerHTML = '<tr><td colspan="4" style="text-align: center;">Nenhum usuário encontrado.</td></tr>';
                return;
            }

            usuarios.forEach(user => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${user.nome}</td>
                    <td>${user.email}</td>
                    <td><span class="badge badge-${user.tipo}">${user.tipo}</span></td>
                    <td class="actions">
                        <button class="btn btn-warning btn-sm" onclick='abrirModalEdicao(${JSON.stringify(user)})'>Editar</button>
                        <button class="btn btn-danger btn-sm" onclick="excluirUsuario(${user.id})">Excluir</button>
                    </td>
                `;
                listaUsuariosBody.appendChild(tr);
            });
        }

        function abrirModalEdicao(user) {
            document.getElementById('editId').value = user.id;
            document.getElementById('editNome').value = user.nome;
            document.getElementById('editEmail').value = user.email;
            document.getElementById('editTipo').value = user.tipo;
            document.getElementById('editSenha').value = ''; // Limpa campo de senha
            
            modalEdicao.style.display = 'flex';
        }

        function fecharModal() {
            modalEdicao.style.display = 'none';
        }

        // Fecha modal ao clicar fora dele
        window.onclick = function(event) {
            if (event.target == modalEdicao) {
                fecharModal();
            }
        }

        /**
         * Sistema de Notificação (Toast)
         */
        function showToast(message, type = 'success') {
            toast.textContent = message;
            toast.style.display = 'block';
            
            if (type === 'success') {
                toast.style.backgroundColor = 'var(--success-color)';
            } else {
                toast.style.backgroundColor = 'var(--danger-color)';
            }

            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
