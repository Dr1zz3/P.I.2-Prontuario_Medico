<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Prontuário Médico</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
}

.container {
    max-width: 800px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

h3 {
    margin-top: 30px;
    border-bottom: 2px solid #ddd;
    padding-bottom: 5px;
}

.form-group {
    margin-bottom: 15px;
}

label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
}

input, textarea {
    width: 100%;
    padding: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

textarea {
    resize: none;
    height: 80px;
}

.row {
    display: flex;
    gap: 10px;
}

.row .form-group {
    flex: 1;
}

button {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    border: none;
    background: #2c3e50;
    color: white;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #1a252f;
}
</style>

</head>

<body>

<div class="container">

<h1>Prontuário Médico</h1>

<form id="formProntuario">

<div class="form-group">
    <label>Paciente</label>
    <input type="text" id="nome">
</div>

<div class="form-group">
    <label>Data de Nascimento</label>
    <input type="date" id="data_nascimento">
</div>

<div class="row">
    <div class="form-group">
        <label>Peso (kg)</label>
        <input type="number" id="peso">
    </div>

    <div class="form-group">
        <label>Altura (m)</label>
        <input type="number" step="0.01" id="altura">
    </div>
</div>

<h3>Sinais Vitais</h3>

<div class="row">
    <div class="form-group">
        <label>Pressão</label>
        <input type="text" id="pressao">
    </div>

    <div class="form-group">
        <label>Temperatura</label>
        <input type="text" id="temperatura">
    </div>
</div>

<div class="row">
    <div class="form-group">
        <label>Frequência Cardíaca</label>
        <input type="text" id="frequencia">
    </div>

    <div class="form-group">
        <label>Respiração</label>
        <input type="text" id="respiracao">
    </div>
</div>

<div class="form-group">
    <label>Saturação</label>
    <input type="text" id="saturacao">
</div>

<h3>Informações Médicas</h3>

<div class="form-group">
    <label>Sintomas</label>
    <textarea id="sintomas"></textarea>
</div>

<div class="form-group">
    <label>Diagnóstico</label>
    <textarea id="diagnostico"></textarea>
</div>

<div class="form-group">
    <label>Receita</label>
    <textarea id="receita"></textarea>
</div>

<div class="form-group">
    <label>Observações</label>
    <textarea id="observacoes"></textarea>
</div>

<div class="form-group">
    <label>Data da Consulta</label>
    <input type="date" id="data">
</div>

<button type="submit">Salvar Prontuário</button>

</form>

</div>

<script>
const API_URL = "http://localhost/Prontuario_Medico/backend/prontuarios.php";

document.getElementById("formProntuario").addEventListener("submit", async (e) => {
    e.preventDefault();

    const dados = {
        nome: document.getElementById("nome").value,
        data_nascimento: document.getElementById("data_nascimento").value,
        peso: document.getElementById("peso").value,
        altura: document.getElementById("altura").value,
        pressao: document.getElementById("pressao").value,
        diagnostico: document.getElementById("diagnostico").value,
        receita: document.getElementById("receita").value,
        observacoes: document.getElementById("observacoes").value
    };

    const response = await fetch(API_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(dados)
    });

    const result = await response.json();

    alert(result.msg);
});
</script>

</body>
</html>
