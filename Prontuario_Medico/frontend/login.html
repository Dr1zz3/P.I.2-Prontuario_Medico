<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Clínica Médica</title>
    <!-- Font Awesome para os ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            margin-bottom: 40px;
        }

        .logo h1 {
            font-size: 48px;
            color: #4a148c;
            font-weight: bold;
            letter-spacing: -2px;
            display: flex;
            justify-content: center;
            align-items: baseline;
        }

        .logo h1 span {
            color: #d81b60;
            font-size: 56px;
            line-height: 0.8;
        }

        .logo p {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #4a148c;
            margin-top: -5px;
            font-weight: 600;
        }

        .input-group {
            display: flex;
            margin-bottom: 15px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow: hidden;
        }

        .input-group:focus-within {
            border-color: #000;
        }

        .input-icon {
            width: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f9f9f9;
            border-right: 1px solid #eee;
            color: #333;
        }

        .input-group input {
            flex: 1;
            padding: 12px 15px;
            border: none;
            outline: none;
            font-size: 16px;
            color: #333;
        }

        .input-group input::placeholder {
            color: #999;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background-color: #4a148c;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: background-color 0.3s;
        }

        .btn-primary:hover {
            background-color: #310d5e;
        }

        .btn-secondary {
            width: 100%;
            padding: 10px;
            background-color: #fff;
            color: #333;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: background-color 0.2s;
        }

        .btn-secondary:hover {
            background-color: #f9f9f9;
        }

        .footer-badge {
            margin-top: 30px;
            display: inline-flex;
            align-items: center;
            background-color: #000;
            color: #fff;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 10px;
            text-align: left;
        }

        .footer-badge i {
            font-size: 24px;
            color: #4caf50;
            margin-right: 8px;
        }

        .footer-badge .text-bold {
            font-weight: bold;
            font-size: 14px;
            display: block;
        }

        .footer-badge .text-small {
            color: #ccc;
            text-transform: uppercase;
        }
    </style>
</head>
        <!--Login-->
<body>

<div class="login-container">
        <div class="logo">
            <h1>MED<span>+</span>CLIN</h1>
            <p>Atendimento Médico</p>
        </div>

        <form id="formLogin">
            <div class="input-group">
                <div class="input-icon">
                    <i class="fas fa-user"></i>
                </div>
                <input type="text" id="email" placeholder="E-mail, CPF" required>
            </div>

            <div class="input-group">
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                </div>
                <input type="password" id="senha" placeholder="Senha" required>
            </div>

            <button type="submit" class="btn-primary">
                <i class="fas fa-sign-in-alt"></i> Acessar
            </button>

            <button type="button" onclick="mostrarCadastro()" class="btn-secondary">
                Criar Conta
            </button>

        </form>

        <!--Registro--> 

    <div id="registerBox" style="display:none;">

        <form id="formRegister">

            <div class="input-group">
                <input type="text" id="nome" placeholder="Nome" required>
            </div>

            <div class="input-group">
                <input type="email" id="emailRegister" placeholder="Email" required>
            </div>

            <div class="input-group">
                <input type="password" id="senhaRegister" placeholder="Senha" required>
            </div>

            <div class="input-group">
                <select id="tipo">
                    <option value="medico">Médico</option>
                    <option value="paciente">Paciente</option>
                </select>
            </div>

            <button type="submit" class="btn-primary">
                Criar Conta
            </button>

            <button type="button" onclick="mostrarLogin()" class="btn-secondary">
                Voltar
            </button>

        </form>

    </div>

        <div class="footer-badge">
            <i class="fas fa-shield-halved"></i>
            <div>
                <span class="text-bold">SITE BLINDADO</span>
                <span class="text-small">Auditado em 22 Abr</span>
            </div>
            </div>
        
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {

        // 🔁 TROCA ENTRE LOGIN E CADASTRO
        window.mostrarCadastro = function () {
            document.getElementById("formLogin").style.display = "none";
            document.getElementById("registerBox").style.display = "block";
        };

        window.mostrarLogin = function () {
            document.getElementById("formLogin").style.display = "block";
            document.getElementById("registerBox").style.display = "none";
        };

        const API_USUARIOS = "http://localhost/Prontuario_Medico/backend/usuarios.php";

        const formRegister = document.getElementById("formRegister");

        if (formRegister) {
            formRegister.addEventListener("submit", async (e) => {
                e.preventDefault();

                const dados = {
                    nome: document.getElementById("nome").value,
                    email: document.getElementById("emailRegister").value,
                    senha: document.getElementById("senhaRegister").value,
                    tipo: document.getElementById("tipo").value
                };

                try {
                    const response = await fetch(API_USUARIOS, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(dados)
                    });

                    const result = await response.json();

                    alert(result.msg);

                    mostrarLogin();

                } catch (error) {
                    alert("Erro ao cadastrar");
                    console.error(error);
                }
            });
        }

    });
</script>

<script>
    const API_URL = "http://localhost/Prontuario_Medico/backend/login.php";

    document.addEventListener("DOMContentLoaded", () => {

        document.getElementById("formLogin").addEventListener("submit", async (e) => {
            e.preventDefault();

            const dados = {
                email: document.getElementById("email").value,
                senha: document.getElementById("senha").value
            };

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                    "Content-Type": "application/json"
                    },
                    body: JSON.stringify(dados)
                });

                const result = await response.json();

                alert(result.msg);

                if (result.status === "ok") {
                    window.location.href = "prontuario.html";
                }

            } catch (error) {
                alert("Erro ao conectar com o servidor");
                console.error(error);
            }

        });

    });
</script>

</body>
</html>
