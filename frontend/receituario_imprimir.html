<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Receituário — MED+CLIN</title>
    <style>
        @page { size: A4 portrait; margin: 15mm; }
        @media print {
            body { background: #fff !important; }
            .nao-imprimir { display: none !important; }
            .pagina { box-shadow: none !important; margin: 0 !important; }
        }
        /* Para antibiótico: paisagem com 2 vias */
        body.antibiotico { /* configura por JS */ }
        body.antibiotico @page { size: A4 landscape; margin: 10mm; }

        * { margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Georgia', 'Times New Roman', serif; }
        body { background: #e5e9f0; padding: 20px; min-height: 100vh; color: #1a1a1a; }

        .nao-imprimir {
            max-width: 210mm; margin: 0 auto 16px; display: flex; gap: 10px;
            justify-content: flex-end; flex-wrap: wrap;
        }
        .nao-imprimir button, .nao-imprimir a {
            background: #14213d; color: #fff; border: none;
            padding: 10px 18px; border-radius: 8px; font-weight: 700;
            cursor: pointer; text-decoration: none; font-size: 14px;
            font-family: 'Segoe UI', sans-serif;
        }
        .nao-imprimir button:hover, .nao-imprimir a:hover { background: #1f3b68; }
        .nao-imprimir .btn-print { background: #00b894; }

        /* Página do receituário */
        .pagina {
            background: #fff;
            max-width: 210mm; min-height: 297mm;
            margin: 0 auto 20px;
            padding: 20mm 18mm;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        /* Layout antibiótico: 2 vias lado a lado em paisagem */
        .paisagem-2vias {
            max-width: 297mm;
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 0;
            min-height: 210mm; padding: 0;
        }
        .paisagem-2vias .via {
            padding: 15mm 12mm;
            border-right: 2px dashed #999;
        }
        .paisagem-2vias .via:last-child { border-right: none; }

        /* Cabeçalho da clínica */
        .cabecalho {
            display: flex; align-items: center; gap: 16px;
            padding-bottom: 14px; border-bottom: 2px solid #14213d;
            margin-bottom: 18px;
        }
        .cabecalho .logo-letras {
            font-size: 30px; font-weight: 800; color: #14213d;
            letter-spacing: -1px; line-height: 1;
        }
        .cabecalho .logo-letras span { color: #4cc9f0; }
        .cabecalho .info { flex: 1; font-size: 13px; color: #444; }
        .cabecalho .info .nome { font-weight: 700; color: #14213d; font-size: 16px; }

        /* Tipo do receituário */
        .tipo-titulo {
            text-align: center; padding: 8px;
            background: #14213d; color: #fff;
            margin-bottom: 14px; font-size: 14px; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase;
        }
        .tipo-titulo.antibiotico { background: #c65a00; }

        /* Identificação */
        .id-block {
            background: #f9fbfd; border: 1px solid #dce1ea;
            padding: 12px 14px; border-radius: 6px;
            margin-bottom: 14px; font-size: 13px;
        }
        .id-block .row { display: flex; gap: 16px; margin-bottom: 4px; flex-wrap: wrap; }
        .id-block .row .campo { flex: 1; }
        .id-block strong { color: #14213d; }

        /* Comprador (só antibiótico) */
        .comprador-block {
            background: #fffbf5; border: 1px solid #f4a261;
            padding: 12px 14px; border-radius: 6px;
            margin-bottom: 14px; font-size: 12px;
        }
        .comprador-block .titulo { font-weight: 700; color: #c65a00; margin-bottom: 6px; }

        /* Medicamentos */
        .medicamentos-titulo {
            font-size: 13px; font-weight: 700; color: #14213d;
            text-transform: uppercase; letter-spacing: 1px;
            margin-top: 10px; margin-bottom: 8px;
        }
        .medicamento {
            margin-bottom: 14px; padding-left: 8px;
            border-left: 3px solid #4cc9f0;
        }
        .medicamento .nome { font-weight: 700; font-size: 15px; color: #14213d; }
        .medicamento .posologia { font-size: 14px; margin-top: 3px; color: #333; }
        .medicamento .extra { font-size: 12px; color: #666; margin-top: 2px; font-style: italic; }

        /* Observações */
        .observacoes {
            background: #f0f7ff; padding: 12px 14px; border-radius: 6px;
            font-size: 13px; margin-top: 12px; border-left: 3px solid #4cc9f0;
        }
        .observacoes strong { display: block; margin-bottom: 4px; color: #14213d; }

        /* Assinatura */
        .assinatura {
            margin-top: 50px; text-align: center;
        }
        .assinatura .linha { border-top: 1px solid #333;
                             width: 70%; margin: 0 auto 4px; }
        .assinatura .nome { font-weight: 700; color: #14213d; font-size: 14px; }
        .assinatura .crm { font-size: 12px; color: #555; }

        /* Rodapé */
        .rodape {
            margin-top: 30px; padding-top: 10px;
            border-top: 1px solid #dce1ea;
            font-size: 11px; color: #777; text-align: center;
        }

        /* Avisos */
        .aviso-suspensa {
            background: #ffe0e0; border: 2px solid #ef233c;
            padding: 16px; border-radius: 8px;
            margin-bottom: 16px; font-size: 14px; color: #c8001f;
            text-align: center; font-weight: 700;
        }
        .aviso-rascunho {
            background: #fff3cd; border: 2px dashed #f4a261;
            padding: 10px; text-align: center; margin-bottom: 16px;
            font-size: 13px; color: #c65a00; font-weight: 700;
        }

        .marca-via { text-align: center; font-size: 11px; color: #777;
                     font-style: italic; margin-bottom: 8px; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="nao-imprimir">
    <a href="prontuario.html">⬅️ Voltar ao prontuário</a>
    <button class="btn-print" onclick="window.print()">🖨️ Imprimir</button>
</div>

<div id="conteudo">
    <p style="text-align:center; padding:40px; color:#666;">Carregando receita...</p>
</div>

<script>
const API_REC = '../backend/receitas.php';
const params = new URLSearchParams(window.location.search);
const receitaId = parseInt(params.get('id'), 10);

window.addEventListener('DOMContentLoaded', async () => {
    if (!receitaId) {
        document.getElementById('conteudo').innerHTML =
            '<p style="text-align:center; color:#c00; padding:40px;">ID da receita não informado.</p>';
        return;
    }
    await carregarReceita();
});

async function carregarReceita() {
    try {
        const r = await fetch(`${API_REC}?acao=buscar&id=${receitaId}`, { credentials: 'include' });
        const j = await r.json();
        if (j.status !== 'ok') {
            document.getElementById('conteudo').innerHTML =
                `<p style="text-align:center; color:#c00; padding:40px;">${j.msg}</p>`;
            return;
        }
        renderizar(j.receita);
    } catch (err) {
        document.getElementById('conteudo').innerHTML =
            '<p style="text-align:center; color:#c00; padding:40px;">Erro ao carregar receita.</p>';
        console.error(err);
    }
}

function renderizar(r) {
    const isAntibiotico = (r.tipo === 'ANTIBIOTICO');
    if (isAntibiotico) {
        document.body.classList.add('antibiotico');
        document.querySelector('style').sheet.insertRule(
            '@page { size: A4 landscape; margin: 10mm; }', 0
        );
    }
    // Constrói corpo do receituário (uma "via")
    const corpo = construirCorpo(r);

    const html = isAntibiotico
        ? `<div class="pagina paisagem-2vias">
              <div class="via">
                  <div class="marca-via">— 1ª VIA: FARMÁCIA —</div>
                  ${corpo}
              </div>
              <div class="via">
                  <div class="marca-via">— 2ª VIA: PACIENTE —</div>
                  ${corpo}
              </div>
           </div>`
        : `<div class="pagina">${corpo}</div>`;

    document.getElementById('conteudo').innerHTML = html;
}

function construirCorpo(r) {
    const dataEmissao = new Date(r.data_emissao).toLocaleDateString('pt-BR');
    const validadeDate = new Date(r.data_emissao);
    validadeDate.setDate(validadeDate.getDate() + (r.validade_dias || 30));

    const endClinica = montarEndereco(
        r.clinica_logradouro, r.clinica_numero, r.clinica_bairro,
        r.clinica_cidade, r.clinica_uf, r.clinica_cep
    );
    const endPaciente = montarEndereco(
        r.paciente_logradouro, r.paciente_numero, r.paciente_bairro,
        r.paciente_cidade, r.paciente_uf, r.paciente_cep
    );

    const avisoSusp = (r.status === 'SUSPENSO')
        ? `<div class="aviso-suspensa">⚠️ RECEITA SUSPENSA<br><span style="font-weight:400;font-size:13px;">Motivo: ${escapar(r.justificativa_suspensao)}</span></div>`
        : '';
    const avisoRasc = (r.status === 'RASCUNHO')
        ? `<div class="aviso-rascunho">RASCUNHO — receita ainda não assinada</div>`
        : '';

    const tipoLabel = (r.tipo === 'ANTIBIOTICO')
        ? 'RECEITUÁRIO ESPECIAL — ANTIBIÓTICO'
        : 'RECEITUÁRIO COMUM';

    const compradorBlock = (r.tipo === 'ANTIBIOTICO') ? `
        <div class="comprador-block">
            <div class="titulo">📋 Identificação do comprador</div>
            <div>${escapar(r.comprador_nome || '')}
                ${r.comprador_cpf ? ' · CPF: ' + formatarCpf(r.comprador_cpf) : ''}
                ${r.comprador_rg ? ' · RG: ' + escapar(r.comprador_rg) : ''}
            </div>
        </div>
    ` : '';

    const medicamentosHtml = (r.itens || []).map((it, i) => `
        <div class="medicamento">
            <div class="nome">${i + 1}. ${escapar(it.descricao_livre)}</div>
            <div class="posologia">${escapar(it.posologia)}</div>
            ${it.quantidade || parseInt(it.uso_continuo,10) ? `
                <div class="extra">
                    ${it.quantidade ? 'Quantidade: ' + escapar(it.quantidade) : ''}
                    ${parseInt(it.uso_continuo,10) ? ' · USO CONTÍNUO' : ''}
                </div>` : ''}
        </div>
    `).join('');

    return `
        ${avisoSusp}
        ${avisoRasc}

        <div class="cabecalho">
            <div class="logo-letras">MED<span>+</span>CLIN</div>
            <div class="info">
                <div class="nome">${escapar(r.clinica_nome || 'Clínica MED+CLIN')}</div>
                <div>${endClinica}</div>
                ${r.clinica_telefone ? '<div>Tel: ' + escapar(r.clinica_telefone) + '</div>' : ''}
            </div>
        </div>

        <div class="tipo-titulo ${r.tipo === 'ANTIBIOTICO' ? 'antibiotico' : ''}">
            ${tipoLabel}
        </div>

        <div class="id-block">
            <div class="row">
                <div class="campo"><strong>Paciente:</strong> ${escapar(r.paciente_nome)}</div>
                <div><strong>CPF:</strong> ${formatarCpf(r.paciente_cpf)}</div>
            </div>
            ${endPaciente ? `<div class="row"><div class="campo"><strong>Endereço:</strong> ${endPaciente}</div></div>` : ''}
            <div class="row">
                <div><strong>Data:</strong> ${dataEmissao}</div>
                <div><strong>Validade:</strong> ${validadeDate.toLocaleDateString('pt-BR')}
                    (${r.validade_dias} dias)</div>
            </div>
        </div>

        ${compradorBlock}

        <div class="medicamentos-titulo">Prescrição</div>
        ${medicamentosHtml}

        ${r.observacoes ? `<div class="observacoes"><strong>Observações:</strong>${escapar(r.observacoes)}</div>` : ''}

        <div class="assinatura">
            <div class="linha"></div>
            <div class="nome">Dr(a). ${escapar(r.medico_nome)}</div>
            <div class="crm">${escapar(r.especialidade)} — CRM ${escapar(r.crm_numero)}/${escapar(r.crm_uf)}</div>
        </div>

        <div class="rodape">
            ${escapar(r.clinica_nome || '')} · ${endClinica}
        </div>
    `;
}

function montarEndereco(log, num, bai, cid, uf, cep) {
    const partes = [];
    if (log) partes.push(log + (num ? ', ' + num : ''));
    if (bai) partes.push(bai);
    if (cid && uf) partes.push(cid + '/' + uf);
    else if (cid) partes.push(cid);
    if (cep) partes.push('CEP ' + formatarCep(cep));
    return partes.join(' · ');
}

function formatarCpf(cpf) {
    if (!cpf || cpf.length !== 11) return cpf || '—';
    return cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
}
function formatarCep(cep) {
    if (!cep || cep.length !== 8) return cep || '';
    return cep.replace(/(\d{5})(\d{3})/, '$1-$2');
}
function escapar(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
}
</script>

</body>
</html>
