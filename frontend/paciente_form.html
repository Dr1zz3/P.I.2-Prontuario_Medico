<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Paciente — MED+CLIN</title>
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <style>
        .form-card { background: #fff; padding: 30px; border-radius: 18px;
                     margin-bottom: 22px; box-shadow: 0 4px 16px rgba(0,0,0,0.05); }
        .form-card h2 { color: #14213d; margin-bottom: 20px;
                        font-size: 17px; border-bottom: 2px solid #4cc9f0;
                        padding-bottom: 8px; display: inline-block; }

        .row { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
        .col-2 { grid-column: span 2; }
        .col-3 { grid-column: span 3; }
        @media(max-width:700px){ .col-2, .col-3 { grid-column: span 1; } }

        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-weight: 600; color: #1d3557; margin-bottom: 6px;
                            font-size: 13px; }
        .form-group label.obr::after { content: ' *'; color: #ef233c; }
        .form-group input, .form-group select, .form-group textarea {
            padding: 11px 13px; border: 1px solid #dce1ea; border-radius: 10px;
            font-size: 14px; outline: none; background: #f9fbfd;
            font-family: inherit;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: #4cc9f0; box-shadow: 0 0 0 3px rgba(76,201,240,0.15);
            background: #fff;
        }
        .form-group textarea { min-height: 70px; resize: vertical; }

        .checkbox-row { display: flex; align-items: center; gap: 10px;
                        padding: 16px; background: #f0f7ff;
                        border: 1px solid #cbe5ff; border-radius: 10px; }
        .checkbox-row input { width: 18px; height: 18px; cursor: pointer; }
        .checkbox-row label { font-size: 14px; color: #14213d; cursor: pointer; }

        .acoes { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
        .btn { padding: 13px 28px; border: none; border-radius: 10px;
               font-weight: 600; font-size: 15px; cursor: pointer; transition: 0.2s; }
        .btn-primario { background: #00b894; color: #fff; }
        .btn-primario:hover { background: #009074; }
        .btn-secund { background: #dce1ea; color: #1d3557; }
        .btn-secund:hover { background: #c0c6cf; }

        .cep-load { font-size: 12px; color: #4cc9f0; margin-left: 8px; }

        .toast { position: fixed; top: 20px; right: 20px; padding: 14px 22px;
                 border-radius: 10px; color: #fff; font-weight: 600; z-index: 2000;
                 box-shadow: 0 6px 20px rgba(0,0,0,0.2);
                 transform: translateX(120%); transition: 0.3s; }
        .toast.visivel { transform: translateX(0); }
        .toast.sucesso { background: #00b894; }
        .toast.erro    { background: #ef233c; }
    </style>
</head>
<body>

<div class="dashboard">

    <aside class="sidebar">
        <div>
            <div class="logo-area">
                <h2>MED<span>+</span>CLIN</h2>
                <p>Cadastro</p>
            </div>
            <nav class="menu">
                <a href="pacientes.html">⬅️ Voltar à lista</a>
            </nav>
        </div>
        <div class="user-box">
            <strong id="user-nome">—</strong>
            <span class="perfil-tag" id="user-perfil">—</span>
        </div>
    </aside>

    <main class="main-content">

        <header class="topbar">
            <div>
                <h1 id="titulo">Cadastro de Paciente</h1>
                <div class="topo-info">Preencha os dados do paciente</div>
            </div>
            <button class="btn-sair" onclick="fazerLogout()">Sair</button>
        </header>

        <form id="formPaciente">

            <section class="form-card">
                <h2>👤 Identificação</h2>
                <div class="row">
                    <div class="form-group col-2">
                        <label class="obr" for="nome">Nome completo</label>
                        <input type="text" id="nome" required>
                    </div>
                    <div class="form-group">
                        <label for="nome_social">Nome social</label>
                        <input type="text" id="nome_social">
                    </div>
                    <div class="form-group">
                        <label class="obr" for="cpf">CPF</label>
                        <input type="text" id="cpf" maxlength="14" placeholder="000.000.000-00" required>
                    </div>
                    <div class="form-group">
                        <label for="rg">RG</label>
                        <input type="text" id="rg">
                    </div>
                    <div class="form-group">
                        <label class="obr" for="data_nascimento">Data de nascimento</label>
                        <input type="date" id="data_nascimento" required>
                    </div>
                    <div class="form-group">
                        <label class="obr" for="sexo">Sexo</label>
                        <select id="sexo" required>
                            <option value="">—</option>
                            <option value="M">Masculino</option>
                            <option value="F">Feminino</option>
                            <option value="O">Outro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="cartao_sus">Cartão SUS</label>
                        <input type="text" id="cartao_sus" maxlength="15">
                    </div>
                </div>
            </section>

            <section class="form-card">
                <h2>📞 Contato</h2>
                <div class="row">
                    <div class="form-group">
                        <label for="telefone">Telefone</label>
                        <input type="text" id="telefone" placeholder="(61) 99999-9999">
                    </div>
                    <div class="form-group col-2">
                        <label for="email">E-mail</label>
                        <input type="email" id="email">
                    </div>
                </div>
            </section>

            <section class="form-card">
                <h2>🏠 Endereço</h2>
                <div class="row">
                    <div class="form-group">
                        <label for="cep">CEP <span class="cep-load" id="cepStatus"></span></label>
                        <input type="text" id="cep" maxlength="9" placeholder="00000-000">
                    </div>
                    <div class="form-group col-2">
                        <label for="logradouro">Logradouro</label>
                        <input type="text" id="logradouro">
                    </div>
                    <div class="form-group">
                        <label for="numero">Número</label>
                        <input type="text" id="numero">
                    </div>
                    <div class="form-group">
                        <label for="complemento">Complemento</label>
                        <input type="text" id="complemento">
                    </div>
                    <div class="form-group">
                        <label for="bairro">Bairro</label>
                        <input type="text" id="bairro">
                    </div>
                    <div class="form-group">
                        <label for="cidade">Cidade</label>
                        <input type="text" id="cidade">
                    </div>
                    <div class="form-group">
                        <label for="uf">UF</label>
                        <input type="text" id="uf" maxlength="2" style="text-transform:uppercase;">
                    </div>
                </div>
            </section>

            <section class="form-card">
                <h2>🩺 Dados clínicos</h2>
                <div class="row">
                    <div class="form-group">
                        <label for="tipo_sanguineo">Tipo sanguíneo</label>
                        <select id="tipo_sanguineo">
                            <option value="">—</option>
                            <option>A+</option><option>A-</option>
                            <option>B+</option><option>B-</option>
                            <option>AB+</option><option>AB-</option>
                            <option>O+</option><option>O-</option>
                        </select>
                    </div>
                    <div class="form-group col-2">
                        <label for="alergias">Alergias conhecidas</label>
                        <textarea id="alergias" placeholder="Ex.: dipirona, penicilina, frutos do mar..."></textarea>
                    </div>
                </div>
            </section>

            <section class="form-card">
                <h2>🔒 LGPD</h2>
                <div class="checkbox-row">
                    <input type="checkbox" id="consentimento_lgpd">
                    <label for="consentimento_lgpd">
                        O paciente consente com o tratamento de seus dados pessoais
                        conforme a Lei Geral de Proteção de Dados (LGPD).
                    </label>
                </div>
            </section>

            <div class="acoes">
                <button type="submit" class="btn btn-primario">💾 Salvar</button>
                <a href="pacientes.html" class="btn btn-secund">Cancelar</a>
            </div>
        </form>

    </main>
</div>

<div id="toast" class="toast"></div>

<script src="assets/js/sessao.js"></script>
<script>
const API = '../backend/pacientes.php';
const params = new URLSearchParams(window.location.search);
const pacienteId = parseInt(params.get('id'), 10) || null;

window.addEventListener('DOMContentLoaded', async () => {
    await verificarSessao('RECEPCAO', 'ADMIN', 'MEDICO');

    // Máscaras
    document.getElementById('cpf').addEventListener('input', e => mascaraCpf(e.target));
    document.getElementById('cep').addEventListener('input', e => mascaraCep(e.target));
    document.getElementById('cep').addEventListener('blur', e => buscarCep(e.target.value));
    document.getElementById('telefone').addEventListener('input', e => mascaraTel(e.target));

    if (pacienteId) {
        document.getElementById('titulo').textContent = 'Editar Paciente';
        await carregarPaciente(pacienteId);
    }

    document.getElementById('formPaciente').addEventListener('submit', salvar);
});

async function carregarPaciente(id) {
    const r = await fetch(`${API}?acao=buscar&id=${id}`, { credentials: 'include' });
    const j = await r.json();
    if (j.status !== 'ok') return toast(j.msg || 'Erro.', 'erro');
    const p = j.paciente;
    [
        'nome','nome_social','rg','data_nascimento','sexo','cartao_sus',
        'telefone','email','cep','logradouro','numero','complemento',
        'bairro','cidade','uf','tipo_sanguineo','alergias'
    ].forEach(k => {
        const el = document.getElementById(k);
        if (el && p[k] !== null && p[k] !== undefined) el.value = p[k];
    });
    document.getElementById('cpf').value = formatarCpfDisplay(p.cpf);
    document.getElementById('consentimento_lgpd').checked = !!p.consentimento_lgpd;
}

async function buscarCep(cep) {
    cep = cep.replace(/\D/g,'');
    if (cep.length !== 8) return;
    const status = document.getElementById('cepStatus');
    status.textContent = 'buscando...';
    try {
        const r = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
        const j = await r.json();
        if (j.erro) {
            status.textContent = 'CEP não encontrado';
            return;
        }
        document.getElementById('logradouro').value = j.logradouro || '';
        document.getElementById('bairro').value     = j.bairro     || '';
        document.getElementById('cidade').value     = j.localidade || '';
        document.getElementById('uf').value         = j.uf         || '';
        status.textContent = '✓ encontrado';
        setTimeout(() => status.textContent = '', 2000);
        document.getElementById('numero').focus();
    } catch(_) {
        status.textContent = 'erro ViaCEP';
    }
}

async function salvar(e) {
    e.preventDefault();

    const dados = {
        nome:               document.getElementById('nome').value,
        nome_social:        document.getElementById('nome_social').value,
        cpf:                document.getElementById('cpf').value,
        rg:                 document.getElementById('rg').value,
        data_nascimento:    document.getElementById('data_nascimento').value,
        sexo:               document.getElementById('sexo').value,
        cartao_sus:         document.getElementById('cartao_sus').value,
        telefone:           document.getElementById('telefone').value,
        email:              document.getElementById('email').value,
        cep:                document.getElementById('cep').value,
        logradouro:         document.getElementById('logradouro').value,
        numero:             document.getElementById('numero').value,
        complemento:        document.getElementById('complemento').value,
        bairro:             document.getElementById('bairro').value,
        cidade:             document.getElementById('cidade').value,
        uf:                 document.getElementById('uf').value,
        tipo_sanguineo:     document.getElementById('tipo_sanguineo').value,
        alergias:           document.getElementById('alergias').value,
        consentimento_lgpd: document.getElementById('consentimento_lgpd').checked,
    };

    const url    = pacienteId ? `${API}?acao=atualizar&id=${pacienteId}` : `${API}?acao=criar`;
    const method = pacienteId ? 'PUT' : 'POST';

    const r = await fetch(url, {
        method, credentials: 'include',
        headers: { 'Content-Type':'application/json' },
        body: JSON.stringify(dados),
    });
    const j = await r.json();
    if (j.status === 'ok' || r.status === 201) {
        toast(j.msg || 'Salvo.', 'sucesso');
        setTimeout(() => window.location.href = 'pacientes.html', 800);
    } else {
        toast(j.msg || 'Erro ao salvar.', 'erro');
    }
}

// ---------- Máscaras ----------
function mascaraCpf(el) {
    let v = el.value.replace(/\D/g,'').slice(0,11);
    v = v.replace(/(\d{3})(\d)/,'$1.$2');
    v = v.replace(/(\d{3})(\d)/,'$1.$2');
    v = v.replace(/(\d{3})(\d{1,2})$/,'$1-$2');
    el.value = v;
}
function mascaraCep(el) {
    let v = el.value.replace(/\D/g,'').slice(0,8);
    v = v.replace(/(\d{5})(\d)/, '$1-$2');
    el.value = v;
}
function mascaraTel(el) {
    let v = el.value.replace(/\D/g,'').slice(0,11);
    if (v.length > 10) v = v.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
    else if (v.length > 6) v = v.replace(/(\d{2})(\d{4})(\d{0,4})/, '($1) $2-$3');
    else if (v.length > 2) v = v.replace(/(\d{2})(\d+)/, '($1) $2');
    el.value = v;
}
function formatarCpfDisplay(cpf) {
    if (!cpf || cpf.length !== 11) return cpf || '';
    return cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
}

function toast(msg, tipo) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast visivel ' + (tipo || 'sucesso');
    setTimeout(() => t.classList.remove('visivel'), 3000);
}
</script>

</body>
</html>
